name: Release APK

on:
  release:
    types: [published]

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./FlashlightApp

      # Для подписанного релизного APK необходимо настроить keystore через секреты
      # Создайте следующие секреты в настройках репозитория:
      # KEYSTORE_BASE64 - base64_encoded содержимое вашего keystore файла
      # KEYSTORE_PASSWORD - пароль от keystore
      # KEY_ALIAS - алиас ключа
      # KEY_PASSWORD - пароль ключа
      
      - name: Decode Keystore (если настроены секреты)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > app/keystore.jks
        working-directory: ./FlashlightApp
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: ./FlashlightApp
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: FlashlightApp/app/build/outputs/apk/release/app-release.apk
